<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - EduVault</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 dark:bg-slate-950 min-h-screen flex items-center justify-center px-4">
    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-8 rounded-2xl shadow-md max-w-sm w-full">
        <h2 class="text-2xl font-black text-center text-indigo-950 dark:text-indigo-400 mb-6 uppercase tracking-tight">Create Account</h2>
        
        <!-- Flash Feedback Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, msg in messages %}
              <div class="p-3 mb-4 text-xs rounded-lg bg-red-100 text-red-800">
                {{ msg }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/signup" method="POST" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Create Username</label>
                <input type="text" name="username" required placeholder="e.g. student01" class="w-full bg-slate-50 dark:bg-slate-950 p-2.5 border border-slate-200 dark:border-slate-800 rounded-xl text-sm">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Set Password</label>
                <input type="password" name="password" required placeholder="Create password" class="w-full bg-slate-50 dark:bg-slate-950 p-2.5 border border-slate-200 dark:border-slate-800 rounded-xl text-sm">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs p-3.5 rounded-xl uppercase transition">Register</button>
        </form>
        <p class="mt-4 text-center text-xs text-slate-500">
            Already have an account? <a href="/login" class="text-blue-600 hover:underline font-bold">Sign In</a>
        </p>
    </div>
</body>
</html>

{% extends 'base.html' %}
{% block content %}
<div class="max-w-4xl mx-auto px-6 py-10 flex flex-col h-[85vh]">

    <div class="mb-6 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-black text-slate-800 dark:text-white">👨‍💻Stone AI Assistant</h1>
            <p class="text-xs text-slate-400">Ask any academic question and receive step-by-step guidance.</p>
        </div>
        <button onclick="clearTutorLogs()" class="text-xs font-bold text-red-500 hover:text-red-600 hover:underline transition">Clear Logs</button>
    </div>

    <!-- Chat Stream Pane -->
    <div id="tutor-chat-stream" class="flex-grow bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 overflow-y-auto space-y-4 custom-scrollbar shadow-sm">
        <div class="bg-blue-50/50 dark:bg-blue-950/20 border border-blue-100/50 dark:border-blue-900/30 p-4 rounded-2xl max-w-lg text-xs leading-relaxed text-slate-700 dark:text-slate-300">
            Hi, I am your EduVault AI Tutor. Paste a question, topic, or ask me to explain a concept step-by-step!
        </div>
    </div>

    <!-- Message Inputs -->
    <div class="mt-4 flex gap-3">
        <input type="text" id="tutor-msg-field" onkeypress="handleKeyPress(event)" placeholder="Ask about calculus, anatomy, or paste a question..." class="flex-grow bg-white dark:bg-slate-900 p-3.5 border border-slate-200 dark:border-slate-800 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none transition dark:text-white">
        <button onclick="sendTutorMessage()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs px-6 rounded-xl transition shadow-md shadow-blue-500/10">Send Query</button>
    </div>
</div>

<!-- Markdown, mathematical formulas, and safe HTML rendering CDN integrations -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
    window.MathJax = {
        tex: {
            inlineMath: [['$', '$'], ['\\(', '\\)']],
            displayMath: [['$$', '$$'], ['\\[', '\\]']]
        },
        options: {
            skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
        }
    };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>

<script>
    // Enable pressing "Enter" on keyboard to send message
    function handleKeyPress(e) {
        if (e.key === 'Enter') {
            sendTutorMessage();
        }
    }

    // Helper to format Gemini's Markdown, math LaTeX, emojis, and structures safely
    function formatAIResponse(text) {
        if (!text) return "";
        
        // Convert Markdown to parsed HTML
        const markdownHtml = marked.parse(text, {
            breaks: true,
            gfm: true
        });

        // Sanitize raw HTML string before rendering to prevent XSS vulnerability
        return DOMPurify.sanitize(markdownHtml);
    }

    function sendTutorMessage() {
        const input = document.getElementById('tutor-msg-field');
        const msg = input.value.trim();
        if (!msg) return;

        const stream = document.getElementById('tutor-chat-stream');
        
        // Safely append user message aligned to the right (No raw string HTML vulnerabilities)
        const userBubble = document.createElement("div");
        userBubble.className = "flex justify-end";

        const userMessageElement = document.createElement("div");
        userMessageElement.className = "bg-blue-600 text-white p-4 rounded-2xl max-w-lg text-xs leading-relaxed font-semibold shadow-sm";
        userMessageElement.textContent = msg;

        userBubble.appendChild(userMessageElement);
        stream.appendChild(userBubble);

        input.value = "";
        stream.scrollTop = stream.scrollHeight;

        // Append a premium pulsing loading indicator for Gemini
        const loadingId = "loader-" + Date.now();
        const loader = document.createElement("div");
        loader.id = loadingId;
        loader.className = "flex items-center space-x-2 bg-slate-100 dark:bg-slate-800/60 p-4 rounded-2xl max-w-[200px] text-xs leading-relaxed text-slate-400 dark:text-slate-500 animate-pulse border border-slate-200/40 dark:border-slate-800";
        loader.innerHTML = `
            <div class="h-2 w-2 bg-blue-600 rounded-full animate-bounce"></div>
            <div class="h-2 w-2 bg-blue-600 rounded-full animate-bounce [animation-delay:0.2s]"></div>
            <div class="h-2 w-2 bg-blue-600 rounded-full animate-bounce [animation-delay:0.4s]"></div>
            <span class="font-bold pl-1">Kayo is thinking...</span>
        `;
        stream.appendChild(loader);
        stream.scrollTop = stream.scrollHeight;

        // Send query to python backend
        fetch('/api/tutor/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: msg })
        })
        .then(res => res.json())
        .then(data => {
            // Remove the loading indicator
            const activeLoader = document.getElementById(loadingId);
            if (activeLoader) activeLoader.remove();

            if (data.error) {
                // Render error banner safely
                const errorDiv = document.createElement("div");
                errorDiv.className = "p-4 bg-red-50/50 dark:bg-red-950/20 border border-red-100 dark:border-red-950 text-red-700 dark:text-red-400 text-xs rounded-2xl max-w-lg";
                errorDiv.innerHTML = `<strong>Error:</strong> ${DOMPurify.sanitize(data.error)}`;
                stream.appendChild(errorDiv);
            } else {
                // Render beautifully formatted Gemini reply
                const formattedAnswer = formatAIResponse(data.response);
                
                const answerElement = document.createElement("div");
                answerElement.className = "bg-slate-100 dark:bg-slate-800/80 border border-slate-200/40 dark:border-slate-800/80 p-4 rounded-2xl max-w-xl text-xs leading-relaxed text-slate-700 dark:text-slate-300 shadow-sm";
                answerElement.innerHTML = formattedAnswer;
                stream.appendChild(answerElement);

                // Run MathJax rendering on the newly appended response block
                if (window.MathJax) {
                    MathJax.typesetPromise([answerElement]).catch(function(error) {
                        console.error("MathJax rendering error:", error);
                    });
                }
            }
            stream.scrollTop = stream.scrollHeight;
        })
        .catch(err => {
            const activeLoader = document.getElementById(loadingId);
            if (activeLoader) activeLoader.remove();
            
            const errorDiv = document.createElement("div");
            errorDiv.className = "p-4 bg-red-50/50 dark:bg-red-950/20 border border-red-100 dark:border-red-950 text-red-700 dark:text-red-400 text-xs rounded-2xl max-w-lg";
            errorDiv.innerHTML = `<strong>Connection Error:</strong> Could not connect to the EduVault servers.`;
            stream.appendChild(errorDiv);
            stream.scrollTop = stream.scrollHeight;
        });
    }

    function clearTutorLogs() {
        document.getElementById('tutor-chat-stream').innerHTML = `
            <div class="bg-blue-50/50 dark:bg-blue-950/20 border border-blue-100/50 dark:border-blue-900/30 p-4 rounded-2xl max-w-lg text-xs leading-relaxed text-slate-700 dark:text-slate-300">
                Chat logs cleared. Ask a new query!
            </div>
        `;
    }
</script>
{% endblock %}

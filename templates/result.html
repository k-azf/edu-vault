{% extends 'base.html' %}
{% block content %}
<div class="max-w-4xl mx-auto px-6 py-12 space-y-10">

    <!-- Hero Card Banner -->
    <div class="bg-slate-900 text-white rounded-3xl p-8 shadow-lg text-center flex flex-col items-center">
        <span class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-full">Diagnostic Sheet</span>
        <h1 class="text-3xl font-black mt-4">Result Analysis</h1>
        <p class="text-xs text-slate-400 mt-1" id="res-title">Practice Exam Review</p>
    </div>

    <!-- Metrics Breakdown Grid -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-6">
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-6 rounded-2xl shadow-sm text-center">
            <span class="text-3xl font-black text-blue-600" id="res-score">0 / 0</span>
            <span class="text-[10px] font-bold text-slate-400 block uppercase mt-1">Score Card</span>
        </div>
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-6 rounded-2xl shadow-sm text-center">
            <span class="text-3xl font-black text-blue-600" id="res-accuracy">0%</span>
            <span class="text-[10px] font-bold text-slate-400 block uppercase mt-1">Accuracy</span>
        </div>
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-6 rounded-2xl shadow-sm text-center">
            <span class="text-3xl font-black text-blue-600" id="res-duration">0m</span>
            <span class="text-[10px] font-bold text-slate-400 block uppercase mt-1">Time Elapsed</span>
        </div>
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-6 rounded-2xl shadow-sm text-center">
            <span class="text-3xl font-black text-blue-600" id="res-grade">B</span>
            <span class="text-[10px] font-bold text-slate-400 block uppercase mt-1">Grade</span>
        </div>
    </div>

    <!-- AI Personalized Feedback Recommendation -->
    <div class="bg-gradient-to-r from-blue-50 to-indigo-50 dark:from-slate-900 dark:to-indigo-950/40 border border-blue-100 dark:border-indigo-950 rounded-2xl p-6">
        <h3 class="text-xs font-black tracking-widest uppercase text-blue-600 mb-2 flex items-center gap-2">
            <span>✨</span> Personalized AI Study Recommendation
        </h3>
        <p id="res-ai-feedback" class="text-sm text-slate-700 dark:text-slate-300 leading-relaxed font-medium">Processing diagnostics...</p>
    </div>

    <div class="flex justify-center">
        <a href="/" class="bg-slate-900 dark:bg-slate-100 text-white dark:text-slate-900 text-xs font-bold px-6 py-3.5 rounded-xl">Back to Dashboard</a>
    </div>
</div>

<script>
    const resultId = "{{ result_id }}";
    fetch(`/api/results/${resultId}`)
        .then(res => res.json())
        .then(data => {
            document.getElementById('res-title').innerText = data.exam_title;
            document.getElementById('res-score').innerText = `${data.score} / ${data.total_questions}`;
            document.getElementById('res-accuracy').innerText = `${Math.round(data.accuracy)}%`;
            
            const mins = Math.round(data.time_used_seconds / 60);
            document.getElementById('res-duration').innerText = `${mins}m`;
            
            let grade = 'F';
            if (data.accuracy >= 90) grade = 'A';
            else if (data.accuracy >= 80) grade = 'B';
            else if (data.accuracy >= 70) grade = 'C';
            else if (data.accuracy >= 60) grade = 'D';
            
            document.getElementById('res-grade').innerText = grade;
            document.getElementById('res-ai-feedback').innerText = data.ai_recommendation || "Maintain consistent focus on exam guidelines.";
        });
</script>
{% endblock %}
